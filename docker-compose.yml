services:
  auth-service:
    build: ./auth-service
    image: backend/auth-service:latest
    container_name: auth-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT:-3306}/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - backend

  product-service:
    build: ./product-service
    image: backend/product-service:latest
    container_name: product-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT:-3306}/product_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_BATCH_UPLOAD_DIR: /tmp/product-batch
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - backend

  api-gateway:
    build: ./api-gateway
    image: backend/api-gateway:latest
    container_name: api-gateway
    restart: unless-stopped
    environment:
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_AUTH_SERVICE_URL: http://auth-service:8081
      APP_PRODUCT_SERVICE_URL: http://product-service:8082
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${GATEWAY_HOST_PORT:-80}:8080"
    depends_on:
      - auth-service
      - product-service
    networks:
      - backend

networks:
  backend:
    driver: bridge
