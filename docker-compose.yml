services:
  mysql:
    image: mysql:8.0
    container_name: microservices-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: auth_db
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/auth_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      APP_JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-this-must-be-at-least-256-bits-long-secret-key}
      APP_JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  product-service:
    build: ./product-service
    container_name: product-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/product_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      APP_JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-this-must-be-at-least-256-bits-long-secret-key}
      APP_BATCH_UPLOAD_DIR: /tmp/product-batch
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    environment:
      APP_JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-this-must-be-at-least-256-bits-long-secret-key}
      APP_AUTH_SERVICE_URL: http://auth-service:8081
      APP_PRODUCT_SERVICE_URL: http://product-service:8082
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    depends_on:
      - auth-service
      - product-service
    networks:
      - backend

volumes:
  mysql_data:

networks:
  backend:
    driver: bridge
