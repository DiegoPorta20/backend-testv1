server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods: [GET, POST, PUT, DELETE, OPTIONS]
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: ${APP_AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: product-service
          uri: ${APP_PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/products/**

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-in-prod-this-must-be-at-least-256-bits-long-secret-key}
  security:
    public-paths:
      - /api/auth/login
      - /api/auth/register
      - /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
